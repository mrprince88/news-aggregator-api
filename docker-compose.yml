services:
  mongodb:
    image: mongo:7
    container_name: news-aggregator-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: news_aggregator
    volumes:
      - mongo-data:/data/db

  api:
    build: .
    container_name: news-aggregator-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/news_aggregator
    depends_on:
      - mongodb

volumes:
  mongo-data:
    driver: local

